<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #0073e6;
    }
    .status {
      padding: 8px;
      background: #e7f3ff;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-top: 8px;
    }
    button:hover {
      background: #0056b3;
    }
    button.secondary {
      background: #6c757d;
    }
    button.secondary:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <h1>UGS Validator</h1>
  <div class="status" id="status">
    Ready to validate JEXL expressions
  </div>
  <div class="info">
    Click the button below to show the floating validation UI on the current page.
  </div>
  <button id="showFloatingUI">Show Floating UI</button>
  <button id="hideFloatingUI" class="secondary" style="display: none;">Hide Floating UI</button>
  
  <script src="popup.js"></script>
</body>
</html>
